<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEMI-DUO | DET PREP PRO</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <section id="setup-view" class="view">
      <div class="logo-container">
        <h1 class="logo-text">SEMI<span class="highlight">DUO</span></h1>
        <p>프로들을 위한 DET 훈련소</p>
      </div>
      <div class="menu-grid">
        <button id="btn-mode-photo" class="primary-btn">📸 사진 묘사하기</button>
        <button id="btn-mode-dictation" class="primary-btn">🎧 듣고 받아쓰기</button>
        <button id="btn-mode-blank" class="primary-btn">🧩 빈칸 채우기 (C-Test)</button>
      </div>
      <button id="btn-history" class="secondary-btn" style="margin-top:20px;">나의 학습 기록 및 단어장</button>
    </section>

    <section id="quiz-view" class="view hidden">
      <header class="quiz-header">
        <div class="progress-bar"><div id="progress-filler"></div></div>
        <div id="timer" class="timer">00:00</div>
      </header>
      <main class="quiz-main">
        <div id="instruction" class="instruction">지시문</div>
        
        <div id="task-container" class="task-container">
          <img id="target-image" class="hidden" src="" alt="Random Photo">
          <div id="image-loader" class="loader hidden">이미지 로딩중...</div>
          <button id="play-audio-btn" class="audio-btn hidden">🔊 음성 듣기</button>
          <div id="blank-text-display" class="blank-text hidden"></div>
        </div>

        <textarea id="user-input" placeholder="여기에 입력하세요..."></textarea>
      </main>
      <footer>
        <button id="submit-btn" class="primary-btn inactive" disabled>제출하기</button>
      </footer>
    </section>

    <section id="history-view" class="view hidden">
      <header class="review-header">
        <button id="btn-home-from-history" class="back-btn">← 메인으로</button>
        <h2>학습 기록 & 단어장</h2>
      </header>
      <main class="review-main">
        <div id="history-list-container"></div>
      </main>
    </section>

    <section id="review-view" class="view hidden">
      <header class="review-header">
        <button id="btn-back-from-review" class="back-btn">← 메인으로</button>
        <h2 id="review-title">분석 결과</h2>
      </header>
      <main class="review-main" id="review-content"></main>
    </section>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
